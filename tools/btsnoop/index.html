<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTSnoop HCI Log Parser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .packet-row:hover { background-color: #f3f4f6; }
        .hex-display { font-family: 'Courier New', monospace; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">BTSnoop HCI Log Parser</h1>
        
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-blue-500 transition-colors" id="dropZone">
                <input type="file" id="fileInput" accept=".log" class="hidden">
                <label for="fileInput" class="cursor-pointer">
                    <div class="text-gray-600 mb-2">
                        <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                    <p class="text-lg font-medium text-gray-700">Click to upload btsnoop_hci.log file</p>
                    <p class="text-sm text-gray-500 mt-1">or drag and drop</p>
                </label>
            </div>
        </div>

        <div id="fileInfo" class="hidden bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">File Information</h2>
            <div id="fileDetails" class="grid grid-cols-2 gap-4 text-sm"></div>
        </div>

        <div id="filters" class="hidden bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Filters</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Packet Type</label>
                    <select id="packetTypeFilter" class="w-full border border-gray-300 rounded-md px-3 py-2">
                        <option value="all">All</option>
                        <option value="command">Command (0x01)</option>
                        <option value="event">Event (0x04)</option>
                        <option value="acl">ACL Data (0x02)</option>
                        <option value="sco">SCO Data (0x03)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Direction</label>
                    <select id="directionFilter" class="w-full border border-gray-300 rounded-md px-3 py-2">
                        <option value="all">All</option>
                        <option value="sent">Sent (Host to Controller)</option>
                        <option value="received">Received (Controller to Host)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">MAC Address</label>
                    <input type="text" id="macFilter" placeholder="Filter by MAC (e.g., AA:BB:CC:DD:EE:FF)" class="w-full border border-gray-300 rounded-md px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Search</label>
                    <input type="text" id="searchFilter" placeholder="Search in hex data..." class="w-full border border-gray-300 rounded-md px-3 py-2">
                </div>
            </div>
            <div class="mt-4 flex gap-2">
                <button id="applyFilters" class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition-colors">Apply Filters</button>
                <button id="resetFilters" class="bg-gray-500 text-white px-4 py-2 rounded-md hover:bg-gray-600 transition-colors">Reset</button>
            </div>
        </div>

        <div id="packetTable" class="hidden bg-white rounded-lg shadow-md overflow-hidden">
            <div class="p-6 border-b border-gray-200">
                <h2 class="text-xl font-semibold text-gray-800">Packets</h2>
                <p id="packetCount" class="text-sm text-gray-500 mt-1"></p>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">#</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Timestamp</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Type</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Direction</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Length</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">MAC Addresses</th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Summary</th>
                        </tr>
                    </thead>
                    <tbody id="packetBody" class="bg-white divide-y divide-gray-200"></tbody>
                </table>
            </div>
            <div id="pagination" class="p-4 border-t border-gray-200 flex justify-between items-center"></div>
        </div>

        <div id="packetDetail" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full max-h-[90vh] overflow-hidden m-4">
                <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                    <h2 class="text-xl font-semibold text-gray-800">Packet Detail</h2>
                    <button id="closeDetail" class="text-gray-400 hover:text-gray-600">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <div class="p-6 overflow-y-auto max-h-[calc(90vh-120px)]">
                    <div id="detailContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
