<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTSnoop HCI Log Parser</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1>BTSnoop HCI Log Parser</h1>
        
        <div class="card">
            <div class="upload-zone" id="dropZone">
                <input type="file" id="fileInput" accept=".log" class="hidden">
                <label for="fileInput" class="cursor-pointer">
                    <svg stroke="currentColor" fill="none" viewBox="0 0 48 48">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <p>Click to upload btsnoop_hci.log file</p>
                    <p>or drag and drop</p>
                </label>
            </div>
        </div>

        <div id="fileInfo" class="card hidden">
            <h2>File Information</h2>
            <div id="fileDetails" class="grid grid-cols-2"></div>
        </div>

        <div id="filters" class="card hidden">
            <h2>Filters</h2>
            <div class="grid grid-cols-3 md:grid-cols-3">
                <div>
                    <label>Packet Type</label>
                    <select id="packetTypeFilter">
                        <option value="all">All</option>
                        <option value="command">Command (0x01)</option>
                        <option value="event">Event (0x04)</option>
                        <option value="acl">ACL Data (0x02)</option>
                        <option value="sco">SCO Data (0x03)</option>
                    </select>
                </div>
                <div>
                    <label>Direction</label>
                    <select id="directionFilter">
                        <option value="all">All</option>
                        <option value="sent">Sent (Host to Controller)</option>
                        <option value="received">Received (Controller to Host)</option>
                    </select>
                </div>
                <div>
                    <label>MAC Address</label>
                    <input type="text" id="macFilter" placeholder="Filter by MAC (e.g., AA:BB:CC:DD:EE:FF)">
                </div>
                <div>
                    <label>Search</label>
                    <input type="text" id="searchFilter" placeholder="Search in hex data...">
                </div>
            </div>
            <div class="mt-4 flex gap-2">
                <button id="applyFilters" class="btn-primary">Apply Filters</button>
                <button id="resetFilters" class="btn-secondary">Reset</button>
            </div>
        </div>

        <div id="packetTable" class="card hidden">
            <div class="p-6 border-b border-gray-200">
                <h2>Packets</h2>
                <p id="packetCount" class="text-gray-500 mt-1"></p>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Timestamp</th>
                            <th>Type</th>
                            <th>Direction</th>
                            <th>Length</th>
                            <th>MAC Addresses</th>
                            <th>Summary</th>
                        </tr>
                    </thead>
                    <tbody id="packetBody"></tbody>
                </table>
            </div>
            <div id="pagination" class="pagination flex justify-between items-center"></div>
        </div>

        <div id="packetDetail" class="modal-overlay hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Packet Detail</h2>
                    <button id="closeDetail" class="modal-close">
                        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="detailContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
