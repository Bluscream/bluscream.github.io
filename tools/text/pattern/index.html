<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Separator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="mb-4">Character Separator</h1>
    <p class="text-muted mb-4">Enter text and a pattern. The pattern will be inserted between each character.</p>

    <div class="mb-3">
      <label for="inputText" class="form-label">Input</label>
      <textarea id="inputText" class="form-control" rows="2" placeholder="e.g. Hello"></textarea>
    </div>

    <div class="mb-3">
      <label for="patternText" class="form-label">Pattern</label>
      <input type="text" id="patternText" class="form-control" placeholder="e.g. - " value=" ">
    </div>

    <div class="mb-3">
      <label for="prefixText" class="form-label">Prefix</label>
      <input type="text" id="prefixText" class="form-control" placeholder="e.g. &lt;">
    </div>

    <div class="mb-3">
      <label for="suffixText" class="form-label">Suffix</label>
      <input type="text" id="suffixText" class="form-control" placeholder="e.g. &gt;">
    </div>

    <button id="goBtn" class="btn btn-primary mb-3">Go</button>

    <div class="mb-3">
      <label for="outputText" class="form-label">Output</label>
      <textarea id="outputText" class="form-control" rows="4" placeholder="Result will appear here..."></textarea>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      const val = params.get(name);
      return val !== null ? decodeURIComponent(val) : '';
    }

    function runTransform() {
      const input = document.getElementById('inputText').value;
      const pattern = document.getElementById('patternText').value;
      const prefix = document.getElementById('prefixText').value;
      const suffix = document.getElementById('suffixText').value;
      const chars = input.split('');
      const result = prefix + chars.join(pattern) + suffix;
      document.getElementById('outputText').value = result;
    }

    document.getElementById('goBtn').addEventListener('click', runTransform);

    (function initFromQuery() {
      const input = getQueryParam('input');
      const pattern = getQueryParam('pattern');
      const prefix = getQueryParam('prefix');
      const suffix = getQueryParam('suffix');
      if (input) document.getElementById('inputText').value = input;
      if (pattern) document.getElementById('patternText').value = pattern;
      if (prefix) document.getElementById('prefixText').value = prefix;
      if (suffix) document.getElementById('suffixText').value = suffix;
      if (input) runTransform();
    })();
  </script>
</body>
</html>
