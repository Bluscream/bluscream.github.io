<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Separator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="mb-3 d-flex align-items-center gap-2">
      <label for="inputText" class="form-label mb-0" style="min-width: 4rem;">Input</label>
      <textarea id="inputText" class="form-control flex-grow-1" rows="2" placeholder="e.g. Hello"></textarea>
    </div>

    <div class="mb-3 d-flex align-items-center gap-2">
      <label for="patternText" class="form-label mb-0" style="min-width: 4rem;">Pattern</label>
      <div class="d-flex align-items-center gap-3 flex-grow-1 flex-nowrap">
        <div class="d-flex align-items-center gap-2 flex-grow-1">
          <input type="text" id="patternText" class="form-control form-control-sm flex-grow-1" placeholder="e.g. - " value=" " style="min-width: 4rem;">
        </div>
        <div class="d-flex align-items-center gap-2">
          <label for="prefixText" class="form-label mb-0">Prefix</label>
          <input type="text" id="prefixText" class="form-control form-control-sm" placeholder="e.g. &lt;" style="width: 8rem;">
        </div>
        <div class="d-flex align-items-center gap-2">
          <label for="suffixText" class="form-label mb-0">Suffix</label>
          <input type="text" id="suffixText" class="form-control form-control-sm" placeholder="e.g. &gt;" style="width: 8rem;">
        </div>
        <div class="d-flex align-items-center gap-2">
          <label for="applyMode" class="form-label mb-0">Apply to</label>
          <select id="applyMode" class="form-select form-select-sm" style="width: auto;">
            <option value="char">Char</option>
            <option value="word">Word</option>
            <option value="line">Line</option>
          </select>
        </div>
        <button id="goBtn" class="btn btn-primary btn-sm">Go</button>
      </div>
    </div>

    <div class="mb-3 d-flex align-items-center gap-2">
      <label for="outputText" class="form-label mb-0" style="min-width: 4rem;">Output</label>
      <textarea id="outputText" class="form-control flex-grow-1" rows="4" placeholder="Result will appear here..."></textarea>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      const val = params.get(name);
      return val !== null ? decodeURIComponent(val) : '';
    }

    function runTransform() {
      const input = document.getElementById('inputText').value;
      const pattern = document.getElementById('patternText').value;
      const prefix = document.getElementById('prefixText').value;
      const suffix = document.getElementById('suffixText').value;
      const mode = document.getElementById('applyMode').value;
      let parts;
      if (mode === 'char') {
        parts = input.split('');
      } else if (mode === 'word') {
        parts = input.split(/\s+/).filter(Boolean);
      } else {
        parts = input.split(/\r?\n/);
      }
      const result = prefix + parts.join(pattern) + suffix;
      document.getElementById('outputText').value = result;
    }

    document.getElementById('goBtn').addEventListener('click', runTransform);

    (function initFromQuery() {
      const input = getQueryParam('input');
      const pattern = getQueryParam('pattern');
      const prefix = getQueryParam('prefix');
      const suffix = getQueryParam('suffix');
      const mode = getQueryParam('mode');
      if (input) document.getElementById('inputText').value = input;
      if (pattern) document.getElementById('patternText').value = pattern;
      if (prefix) document.getElementById('prefixText').value = prefix;
      if (suffix) document.getElementById('suffixText').value = suffix;
      if (['char', 'word', 'line'].includes(mode)) document.getElementById('applyMode').value = mode;
      if (input) runTransform();
    })();
  </script>
</body>
</html>
